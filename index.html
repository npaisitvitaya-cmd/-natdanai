<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Palloo Burst</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #87CEEB; }
        #videoElement { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #gameContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>
</head>
<body>
    <video id="videoElement" autoplay playsinline muted></video>
    <div id="gameContainer"></div>

<script>
// เริ่มต้นใช้งานกล้องและเกม
async function init() {
    const video = document.getElementById('videoElement');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
    } catch (err) { console.log("รออนุญาตกล้อง"); }

    const config = {
        type: Phaser.AUTO,
        parent: 'gameContainer',
        width: window.innerWidth,
        height: window.innerHeight,
        transparent: true,
        scene: {
            create: function() {
                this.score = 0;
                this.scoreText = this.add.text(20, 20, "คะแนน: 0", { fontSize: '24px', fill: '#FFF', stroke: '#000', strokeThickness: 4 });
                
                // Cursor พร้อมแสงเรืองรอง
                this.cursor = this.add.circle(400, 300, 25, 0x00d2ff);
                this.cursor.setStrokeStyle(6, 0xFFFFFF);
                this.tweens.add({ targets: this.cursor, scale: 1.3, duration: 400, yoyo: true, repeat: -1 });

                this.balloons = this.add.group();
                this.input.on('pointermove', (p) => {
                    this.cursor.x = p.x + 80;
                    this.cursor.y = p.y - 60;
                });

                // Spawner
                this.time.addEvent({ delay: 1200, loop: true, callback: () => {
                    const isCorrect = Math.random() > 0.5;
                    const b = this.add.ellipse(Math.random() * 600 + 100, 700, 90, 110, 0xFF7675);
                    b.correct = isCorrect;
                    b.sway = Math.random() * 10;
                    b.label = this.add.text(b.x, b.y, isCorrect ? "มะม่วง" : "โรงเรียน", { 
                        fontSize: '18px', fill: '#FFF', stroke: '#000', strokeThickness: 4, 
                        wordWrap: { width: 70 }, align: 'center' 
                    }).setOrigin(0.5);
                    this.balloons.add(b);
                }});
            },
            update: function(time) {
                this.balloons.children.iterate(b => {
                    if (!b) return;
                    b.x += Math.sin(time / 500 + b.sway) * 2;
                    b.y -= 2;
                    b.label.setPosition(b.x, b.y);
                    
                    if (Phaser.Math.Distance.Between(b.x, b.y, this.cursor.x, this.cursor.y) < 60) {
                        this.score += b.correct ? 10 : -5;
                        this.scoreText.setText("คะแนน: " + this.score);
                        b.label.destroy(); b.destroy();
                    } else if (b.y < -100) { b.label.destroy(); b.destroy(); }
                });
            }
        }
    };
    new Phaser.Game(config);
}

// แตะหน้าจอเพื่อเริ่ม (ป้องกัน iOS บล็อก)
window.addEventListener('click', init, { once: true });
</script>
</body>
</html>
